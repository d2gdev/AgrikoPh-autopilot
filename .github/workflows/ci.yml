name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: autopilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d autopilot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Secret scan
        run: |
          ! git grep -nE 'BEGIN (RSA |EC |OPENSSH |)?PRIVATE KEY|sk-or-v1-|ghp_[A-Za-z0-9_]{20,}|Bearer [A-Za-z0-9._-]{40,}' -- ':!package-lock.json' ':!.github/workflows/ci.yml'

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Typecheck tests
        run: npm run typecheck:test

      - name: Test
        run: npm test

      - name: PostgreSQL migration and concurrency integration tests
        env:
          DATABASE_URL_TEST: postgresql://postgres:postgres@127.0.0.1:5432/autopilot_test?connection_limit=10
        run: npm run test:postgres

      - name: Build
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/autopilot_test?connection_limit=10
        run: npm run build
